version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: indic_user
      POSTGRES_PASSWORD: indic_password
      POSTGRES_DB: indic_db
    ports:
      - "5433:5432"
    volumes:
      - indic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indic_user -d indic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

